name: Build & Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1-5' # 6 AM UTC, weekdays (matches business-day publishing)
  workflow_dispatch:
    inputs:
      sync_algolia:
        description: 'Sync Algolia index'
        type: boolean
        default: false

env:
  ELEVENTY_ENV: production
  PAGE_STATE: production
  BASE_URL: https://gastlichkeit.ovl.design

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Restore eleventy-fetch cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: eleventy-fetch-${{ hashFiles('_src/pages/cards/**/*.md') }}
          restore-keys: eleventy-fetch-
          save-always: true

      - name: Restore eleventy-img cache
        uses: actions/cache@v4
        with:
          path: dist/img
          key: eleventy-img-${{ hashFiles('_src/assets/img/**') }}
          restore-keys: eleventy-img-
          save-always: true

      - run: npm run lint
      - run: npm test

      - name: Build
        env:
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_SEARCH_API_KEY: ${{ secrets.ALGOLIA_SEARCH_API_KEY }}
          ALGOLIA_WRITE_API_KEY: ${{ secrets.ALGOLIA_WRITE_API_KEY }}
          SYNC_ALGOLIA: ${{ github.event_name == 'schedule' || inputs.sync_algolia == true }}
        run: npm run build

      - name: Validate feeds
        run: npm run test:feeds

      - name: Deploy to Uberspace
        env:
          UBERSPACE_SSH_KEY: ${{ secrets.UBERSPACE_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$UBERSPACE_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.UBERSPACE_HOST }} >> ~/.ssh/known_hosts
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key" dist/ ${{ secrets.UBERSPACE_SSH_USER }}@${{ secrets.UBERSPACE_HOST }}:/var/www/virtual/${{ secrets.UBERSPACE_SSH_USER }}/html/
